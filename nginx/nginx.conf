# ──────────────────────────────────────────────────────────
#  FreeCourseHub — Nginx Reverse Proxy + Load Balancer
# ──────────────────────────────────────────────────────────

# Performance tuning
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/xml+rss
               application/atom+xml image/svg+xml;

    # ── Backend upstream (round-robin load balancing) ──────
    upstream backend_pool {
        # Round-robin is default in Nginx
        least_conn;                          # prefer least-connected

        server backend1:5000 max_fails=3 fail_timeout=30s weight=1;
        server backend2:5000 max_fails=3 fail_timeout=30s weight=1;

        # Keep-alive connections to backends
        keepalive 32;
    }

    # ── Rate limiting zones ────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=30r/m;

    # ── Main server block ──────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-Content-Type-Options "nosniff"      always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
        add_header X-Powered-By           "FreeCourseHub" always;

        # ── Health check (no auth, no rate limit) ──────────
        location /health {
            access_log off;
            return 200 '{"status":"ok","nginx":"running"}';
            add_header Content-Type application/json;
        }

        # ── API → Backend pool ─────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_send_timeout     30s;
            proxy_read_timeout     30s;

            # Buffering
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;

            # CORS for API
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Search endpoint — tighter rate limit ───────────
        location /api/search {
            limit_req zone=search_limit burst=10 nodelay;
            limit_req_status 429;

            proxy_pass         http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Connection      "";
        }

        # ── Frontend ───────────────────────────────────────
        location / {
            proxy_pass         http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   Connection        "";

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Custom error pages ─────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"Too many requests. Please slow down."}';
            add_header Content-Type application/json;
        }

        error_page 502 503 504 /50x.json;
        location = /50x.json {
            return 503 '{"error":"Service temporarily unavailable. Please try again."}';
            add_header Content-Type application/json;
        }
    }
}
